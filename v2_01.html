function drawAngleOverlayArc(targetRad, radius, offsetPhi, type, colorHex, degValue) {
  const points = [];
  const segments = 32;
  let colorStr = '#' + colorHex.toString(16).padStart(6, '0');
  
  if (type === 'phi') {
    for (let i = 0; i <= segments; i++) {
      const step = (i / segments) * targetRad;
      points.push(new THREE.Vector3(radius * Math.cos(step), radius * Math.sin(step), 0.01));
    }
    const mid = targetRad / 2;
    const labelTex = new THREE.CanvasTexture(createTextCanvas(`ϕ: ${degValue}°`, colorStr));
    const labelMat = new THREE.SpriteMaterial({ map: labelTex });
    const sprite = new THREE.Sprite(labelMat);
    sprite.position.set((radius + 0.4) * Math.cos(mid), (radius + 0.4) * Math.sin(mid), 0.05);
    sprite.scale.set(1.0, 0.5, 1);
    overlayGroup.add(sprite);

    const arrowGeo = new THREE.ConeGeometry(0.06, 0.2, 4);
    arrowGeo.rotateX(Math.PI / 2);
    const arrowMesh = new THREE.Mesh(arrowGeo, new THREE.MeshBasicMaterial({ color: colorHex }));
    arrowMesh.position.set(radius * Math.cos(targetRad), radius * Math.sin(targetRad), 0.01);
    arrowMesh.rotation.z = targetRad + Math.PI / 2;
    overlayGroup.add(arrowMesh);

  } else if (type === 'theta') {
    for (let i = 0; i <= segments; i++) {
      const step = (i / segments) * targetRad;
      points.push(new THREE.Vector3(
        radius * Math.sin(step) * Math.cos(offsetPhi),
        radius * Math.sin(step) * Math.sin(offsetPhi),
        radius * Math.cos(step)
      ));
    }
    const mid = targetRad / 2;
    const labelTex = new THREE.CanvasTexture(createTextCanvas(`θ: ${degValue}°`, colorStr));
    const labelMat = new THREE.SpriteMaterial({ map: labelTex });
    const sprite = new THREE.Sprite(labelMat);
    sprite.position.set(
      (radius + 0.4) * Math.sin(mid) * Math.cos(offsetPhi),
      (radius + 0.4) * Math.sin(mid) * Math.sin(offsetPhi),
      (radius + 0.4) * Math.cos(mid)
    );
    sprite.scale.set(1.0, 0.5, 1);
    overlayGroup.add(sprite);

    const arrowGeo = new THREE.ConeGeometry(0.06, 0.2, 4);
    arrowGeo.rotateZ(Math.PI / 2);
    const arrowMesh = new THREE.Mesh(arrowGeo, new THREE.MeshBasicMaterial({ color: colorHex }));
    arrowMesh.position.set(
      radius * Math.sin(targetRad) * Math.cos(offsetPhi),
      radius * Math.sin(targetRad) * Math.sin(offsetPhi),
      radius * Math.cos(targetRad)
    );
    arrowMesh.lookAt(
      (radius + 1) * Math.sin(targetRad + 0.1) * Math.cos(offsetPhi),
      (radius + 1) * Math.sin(targetRad + 0.1) * Math.sin(offsetPhi),
      (radius + 1) * Math.cos(targetRad + 0.1)
    );
    overlayGroup.add(arrowMesh);
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  overlayGroup.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color: colorHex })));
}

/* =====================================================================
   RANGE-AWARE COLOR-MAPPED INTERSECTION COMPUTATION ENGINES
   ==================================================================== */
function drawLineCurve(points, colorHex = 0xfacc15) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: colorHex });
  intersectionGroup.add(new THREE.Line(geo, mat));
}

function drawPointMarker(pos, colorHex = 0xfacc15) {
  const geo = new THREE.SphereGeometry(0.12, 16, 16);
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: colorHex }));
  mesh.position.copy(pos);
  intersectionGroup.add(mesh);
}

function getInterval(param, defaultMin = -4, defaultMax = 4, scale = 1) {
  if (!param.visible) return [defaultMin * scale, defaultMax * scale];
  if (param.mode === 'const') return [param.val * scale, param.val * scale];
  return [param.minRange * scale, param.maxRange * scale];
}

/* =====================================================================
   UNIFIED FILL-VOLUME ENGINE
   A single solid region clipped by ALL THREE coordinates at once, reusing
   the exact same getInterval() bounds as the wireframe intersection
   engine above. How many axes are actually "ranged" (min != max) decides
   what gets built:
     - 0 or 1 ranged axes -> a point or a line has no area/volume; fill
       draws nothing (the wireframe intersection lines already show it).
     - 2 ranged axes       -> a bounded 2D surface patch (clipped by both
       ranges AND the third axis's fixed value) rendered as a solid sheet.
     - 3 ranged axes       -> a genuine bounded 3D solid, clipped by all
       three ranges simultaneously.
   ===================================================================== */

// Cartesian: the intervals ARE the box bounds directly -- no coordinate
// transform needed. A degenerate (zero-thickness) box on the single-const
// axis is exactly the 2D patch case, so one code path covers 2D and 3D.
function buildCartesianFillVolume(sys) {
  if (sys.filter(p => p.visible).length < 2) return;
  const [x1, x2] = getInterval(sys[0]);
  const [y1, y2] = getInterval(sys[1]);
  const [z1, z2] = getInterval(sys[2]);

  const rangedCount = [x1 !== x2, y1 !== y2, z1 !== z2].filter(Boolean).length;
  if (rangedCount < 2) return; // point or line -- no area/volume to fill

  const eps = 0.001; // degenerate axis gets a hair of thickness so BoxGeometry still renders a visible sheet
  const sx = Math.max(eps, x2 - x1), sy = Math.max(eps, y2 - y1), sz = Math.max(eps, z2 - z1);
  const cx = (x1 + x2) / 2, cy = (y1 + y2) / 2, cz = (z1 + z2) / 2;

  const geo = new THREE.BoxGeometry(sx, sy, sz);
  geo.translate(cx, cy, cz);
  const mesh = new THREE.Mesh(geo, fillMaterial(sys[0].colorHex));
  const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), wireframeMaterial(sys[1].colorHex));
  fillGroup.add(mesh, wire);
}

// Cylindrical: bounded region rho in [r1,r2], phi in [p1,p2], z in [z1,z2].
// Built as a custom parametric BufferGeometry -- a grid of rho/phi/z
// samples on the "outer shell" of the clipped region, since a true
// generalized rho/phi/z solid isn't one of THREE's primitive shapes.
function buildCylindricalFillVolume(sys) {
  if (sys.filter(p => p.visible).length < 2) return;
  const degToRad = Math.PI / 180;
  let [r1, r2] = getInterval(sys[0], 0.1, 4);
  const [p1, p2] = getInterval(sys[1], 0, 360, degToRad);
  const [z1, z2] = getInterval(sys[2], -4, 4);

  let rangedCount = [r1 !== r2, p1 !== p2, z1 !== z2].filter(Boolean).length;

  // Special case: phi ranged (an arc or full circle) with rho pinned to a
  // single const value and z pinned too. On its own that's just a 1D arc/
  // circle (no area) under the general rule below -- but rho is a radius
  // with a natural, implicit inner edge at 0, so "rho is const at some
  // value while phi sweeps" reads as "the pie-slice/disc out to that
  // radius," same as how a polar plot fills inward to the origin. Treat
  // rho's fill interval as [0, rho.val] here so that sector/disc renders,
  // without touching rho's own const/range semantics anywhere else (const
  // surfaces, intersections, etc. are untouched).
  if (rangedCount === 1 && p1 !== p2 && r1 === r2 && sys[0].mode === 'const' && r1 > 0.0001) {
    r1 = 0;
    rangedCount = 2;
  }

  if (rangedCount < 2) return;

  const geo = buildCylindricalRegionGeometry(r1, r2, p1, p2, z1, z2);
  const mesh = new THREE.Mesh(geo, fillMaterial(sys[0].colorHex));
  const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), wireframeMaterial(sys[1].colorHex));
  fillGroup.add(mesh, wire);
}

// Builds the boundary shell of the region {rho in [r1,r2], phi in [p1,p2],
// z in [z1,z2]} as a closed triangle mesh: inner wall, outer wall, two
// flat radial end-caps (at phi=p1 and phi=p2), and top/bottom annulus caps.
function buildCylindricalRegionGeometry(r1, r2, p1, p2, z1, z2) {
  const segs = 32;
  const positions = [];
  const pushQuad = (a, b, c, d) => { // a,b,c,d as [x,y,z] arrays, wound CCW
    positions.push(...a, ...b, ...c,  ...a, ...c, ...d);
  };

  // Outer wall (rho = r2) and inner wall (rho = r1), each a rho-const
  // cylindrical strip swept across phi in [p1,p2] and z in [z1,z2].
  for (let i = 0; i < segs; i++) {
    const a1 = p1 + (i / segs) * (p2 - p1);
    const a2 = p1 + ((i + 1) / segs) * (p2 - p1);
    const oc1 = [r2 * Math.cos(a1), r2 * Math.sin(a1)];
    const oc2 = [r2 * Math.cos(a2), r2 * Math.sin(a2)];
    pushQuad([oc1[0], oc1[1], z1], [oc2[0], oc2[1], z1], [oc2[0], oc2[1], z2], [oc1[0], oc1[1], z2]);

    if (r1 > 0.0001) {
      const ic1 = [r1 * Math.cos(a1), r1 * Math.sin(a1)];
      const ic2 = [r1 * Math.cos(a2), r1 * Math.sin(a2)];
      // Reverse winding vs. the outer wall since this face points inward.
      pushQuad([ic2[0], ic2[1], z1], [ic1[0], ic1[1], z1], [ic1[0], ic1[1], z2], [ic2[0], ic2[1], z2]);
    }
  }

  // Top (z2) and bottom (z1) annulus caps.
  for (let i = 0; i < segs; i++) {
    const a1 = p1 + (i / segs) * (p2 - p1);
    const a2 = p1 + ((i + 1) / segs) * (p2 - p1);
    const o1 = [r2 * Math.cos(a1), r2 * Math.sin(a1)], o2 = [r2 * Math.cos(a2), r2 * Math.sin(a2)];
    const in1 = [r1 * Math.cos(a1), r1 * Math.sin(a1)], in2 = [r1 * Math.cos(a2), r1 * Math.sin(a2)];
    pushQuad([in1[0], in1[1], z2], [in2[0], in2[1], z2], [o2[0], o2[1], z2], [o1[0], o1[1], z2]);
    pushQuad([o1[0], o1[1], z1], [o2[0], o2[1], z1], [in2[0], in2[1], z1], [in1[0], in1[1], z1]);
  }

  // Radial end-caps at phi = p1 and phi = p2. NOTE: always draw these, even
  // when phi isn't ranged (p1 === p2). In that degenerate case the two
  // quads below coincide (same points, opposite winding), which is exactly
  // what we want: a double-sided flat radial patch spanning rho in
  // [r1,r2] and z in [z1,z2] at the fixed angle. That's the ENTIRE surface
  // for the "rho+z ranged, phi const" case, not merely an end-cap -- so it
  // must not be skipped.
  {
    const c1 = Math.cos(p1), s1 = Math.sin(p1), c2 = Math.cos(p2), s2 = Math.sin(p2);
    pushQuad([r1*c1, r1*s1, z1], [r2*c1, r2*s1, z1], [r2*c1, r2*s1, z2], [r1*c1, r1*s1, z2]);
    pushQuad([r2*c2, r2*s2, z1], [r1*c2, r1*s2, z1], [r1*c2, r1*s2, z2], [r2*c2, r2*s2, z2]);
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return geo;
}

// Spherical: bounded region r in [r1,r2], theta in [t1,t2], phi in [p1,p2].
function buildSphericalFillVolume(sys) {
  if (sys.filter(p => p.visible).length < 2) return;
  const degToRad = Math.PI / 180;
  let [r1, r2] = getInterval(sys[0], 0.1, 4);
  const [t1, t2] = getInterval(sys[1], 0.01, 179.9, degToRad);
  const [p1, p2] = getInterval(sys[2], 0, 360, degToRad);

  let rangedCount = [r1 !== r2, t1 !== t2, p1 !== p2].filter(Boolean).length;

  // Same reasoning as the cylindrical case: a single ranged angle (theta
  // or phi) with r pinned const is a 1D arc under the general rule below,
  // but r has a natural implicit inner edge at 0, so it reads as a sector/
  // disc out to that radius. Fill from r=0 in that case only.
  const angleRanged = (t1 !== t2) || (p1 !== p2);
  if (rangedCount === 1 && angleRanged && r1 === r2 && sys[0].mode === 'const' && r1 > 0.0001) {
    r1 = 0;
    rangedCount = 2;
  }

  if (rangedCount < 2) return;

  const geo = buildSphericalRegionGeometry(r1, r2, t1, t2, p1, p2);
  const mesh = new THREE.Mesh(geo, fillMaterial(sys[0].colorHex));
  const wire = new THREE.LineSegments(new THREE.EdgesGeometry(geo), wireframeMaterial(sys[1].colorHex));
  fillGroup.add(mesh, wire);
}

// Builds the boundary shell of the region {r in [r1,r2], theta in [t1,t2],
// phi in [p1,p2]} -- outer/inner spherical caps, two theta-const conical
// walls, and two phi-const flat radial walls, all clipped together.
function buildSphericalRegionGeometry(r1, r2, t1, t2, p1, p2) {
  const tSegs = 24, pSegs = 32;
  const positions = [];
  const toXYZ = (r, t, p) => [r * Math.sin(t) * Math.cos(p), r * Math.sin(t) * Math.sin(p), r * Math.cos(t)];
  const pushQuad = (a, b, c, d) => { positions.push(...a, ...b, ...c,  ...a, ...c, ...d); };

  // Outer (r2) and inner (r1) spherical shell surfaces over the clipped
  // theta/phi patch.
  for (let i = 0; i < tSegs; i++) {
    const ta = t1 + (i / tSegs) * (t2 - t1);
    const tb = t1 + ((i + 1) / tSegs) * (t2 - t1);
    for (let j = 0; j < pSegs; j++) {
      const pa = p1 + (j / pSegs) * (p2 - p1);
      const pb = p1 + ((j + 1) / pSegs) * (p2 - p1);
      pushQuad(toXYZ(r2, ta, pa), toXYZ(r2, ta, pb), toXYZ(r2, tb, pb), toXYZ(r2, tb, pa));
      if (r1 > 0.0001) {
        pushQuad(toXYZ(r1, ta, pb), toXYZ(r1, ta, pa), toXYZ(r1, tb, pa), toXYZ(r1, tb, pb));
      }
    }
  }

  // Theta-const conical walls at theta = t1 and theta = t2. NOTE: always
  // draw these, even when theta isn't ranged (t1 === t2). In that
  // degenerate case both pushQuad calls trace the same conical patch with
  // opposite winding, giving a double-sided surface -- exactly what's
  // needed for the "r+phi ranged, theta const" case, where this patch is
  // the entire required surface (a fixed-polar-angle cone/disc sector),
  // not merely a wall bounding a theta range.
  {
    for (let j = 0; j < pSegs; j++) {
      const pa = p1 + (j / pSegs) * (p2 - p1);
      const pb = p1 + ((j + 1) / pSegs) * (p2 - p1);
      pushQuad(toXYZ(r1, t1, pa), toXYZ(r1, t1, pb), toXYZ(r2, t1, pb), toXYZ(r2, t1, pa));
      pushQuad(toXYZ(r2, t2, pa), toXYZ(r2, t2, pb), toXYZ(r1, t2, pb), toXYZ(r1, t2, pa));
    }
  }

  // Phi-const flat radial walls at phi = p1 and phi = p2. NOTE: always draw
  // these too, for the same reason -- when phi isn't ranged (p1 === p2)
  // this is the entire surface for the "r+theta ranged, phi const" case
  // (a flat half-plane radial sector), and the two coincident, oppositely
  // wound quads make it double-sided.
  {
    for (let i = 0; i < tSegs; i++) {
      const ta = t1 + (i / tSegs) * (t2 - t1);
      const tb = t1 + ((i + 1) / tSegs) * (t2 - t1);
      pushQuad(toXYZ(r1, ta, p1), toXYZ(r2, ta, p1), toXYZ(r2, tb, p1), toXYZ(r1, tb, p1));
      pushQuad(toXYZ(r2, ta, p2), toXYZ(r1, ta, p2), toXYZ(r1, tb, p2), toXYZ(r2, tb, p2));
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();
  return geo;
}

function buildCartesianIntersections(sys) {
  if (sys.filter(p => p.visible).length < 2) return;

  const [x1, x2] = getInterval(sys[0]);
  const [y1, y2] = getInterval(sys[1]);
  const [z1, z2] = getInterval(sys[2]);

  const c1 = sys[0].colorHex;
  const c2 = sys[1].colorHex;
  const c3 = sys[2].colorHex;

  const xSingle = (x1 === x2), ySingle = (y1 === y2), zSingle = (z1 === z2);

  if (xSingle && ySingle && zSingle) {
    drawPointMarker(new THREE.Vector3(x1, y1, z1), 0xfacc15);
  } 
  else if (xSingle && ySingle) {
    drawLineCurve([new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x1, y1, z2)], c3);
  } else if (xSingle && zSingle) {
    drawLineCurve([new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x1, y2, z1)], c2);
  } else if (ySingle && zSingle) {
    drawLineCurve([new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x2, y1, z1)], c1);
  } 
  else if (xSingle) { 
    drawLineCurve([new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x1, y2, z1)], c2);
    drawLineCurve([new THREE.Vector3(x1, y2, z1), new THREE.Vector3(x1, y2, z2)], c3);
    drawLineCurve([new THREE.Vector3(x1, y2, z2), new THREE.Vector3(x1, y1, z2)], c2);
    drawLineCurve([new THREE.Vector3(x1, y1, z2), new THREE.Vector3(x1, y1, z1)], c3);
  } else if (ySingle) { 
    drawLineCurve([new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x2, y1, z1)], c1);
    drawLineCurve([new THREE.Vector3(x2, y1, z1), new THREE.Vector3(x2, y1, z2)], c3);
    drawLineCurve([new THREE.Vector3(x2, y1, z2), new THREE.Vector3(x1, y1, z2)], c1);
    drawLineCurve([new THREE.Vector3(x1, y1, z2), new THREE.Vector3(x1, y1, z1)], c3);
  } else if (zSingle) { 
    drawLineCurve([new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x2, y1, z1)], c1);
    drawLineCurve([new THREE.Vector3(x2, y1, z1), new THREE.Vector3(x2, y2, z1)], c2);
    drawLineCurve([new THREE.Vector3(x2, y2, z1), new THREE.Vector3(x1, y2, z1)], c1);
    drawLineCurve([new THREE.Vector3(x1, y2, z1), new THREE.Vector3(x1, y1, z1)], c2);
  } 
  else { 
    const c = [
      new THREE.Vector3(x1, y1, z1), new THREE.Vector3(x2, y1, z1),
      new THREE.Vector3(x2, y2, z1), new THREE.Vector3(x1, y2, z1),
      new THREE.Vector3(x1, y1, z2), new THREE.Vector3(x2, y1, z2),
      new THREE.Vector3(x2, y2, z2), new THREE.Vector3(x1, y2, z2)
    ];
    drawLineCurve([c[0], c[1]], c1); drawLineCurve([c[1], c[2]], c2); drawLineCurve([c[2], c[3]], c1); drawLineCurve([c[3], c[0]], c2);
    drawLineCurve([c[4], c[5]], c1); drawLineCurve([c[5], c[6]], c2); drawLineCurve([c[6], c[7]], c1); drawLineCurve([c[7], c[4]], c2);
    drawLineCurve([c[0], c[4]], c3); drawLineCurve([c[1], c[5]], c3); drawLineCurve([c[2], c[6]], c3); drawLineCurve([c[3], c[7]], c3);
  }
}

function drawCylArc(r, pStart, pEnd, z, colorHex = 0xfacc15) {
  const pts = [];
  const segs = 32;
  for (let i = 0; i <= segs; i++) {
    const a = pStart + (i / segs) * (pEnd - pStart);
    pts.push(new THREE.Vector3(r * Math.cos(a), r * Math.sin(a), z));
  }
  drawLineCurve(pts, colorHex);
}

function buildCylindricalIntersections(sys) {
  if (sys.filter(p => p.visible).length < 2) return;

  const degToRad = Math.PI / 180;
  const [r1, r2] = getInterval(sys[0], 0.1, 4);
  const [p1, p2] = getInterval(sys[1], 0, 360, degToRad);
  const [z1, z2] = getInterval(sys[2], -4, 4);

  const c1 = sys[0].colorHex;
  const c2 = sys[1].colorHex;
  const c3 = sys[2].colorHex;

  const rSingle = (r1 === r2), pSingle = (p1 === p2), zSingle = (z1 === z2);

  if (rSingle && pSingle && zSingle) {
    drawPointMarker(new THREE.Vector3(r1 * Math.cos(p1), r1 * Math.sin(p1), z1), 0xfacc15);
  }
  else if (rSingle && pSingle) {
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z1), new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z2)], c3);
  } else if (rSingle && zSingle) {
    drawCylArc(r1, p1, p2, z1, c2);
  } else if (pSingle && zSingle) {
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z1), new THREE.Vector3(r2*Math.cos(p1), r2*Math.sin(p1), z1)], c1);
  }
  else if (rSingle) { 
    drawCylArc(r1, p1, p2, z1, c2); drawCylArc(r1, p1, p2, z2, c2);
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z1), new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z2)], c3);
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p2), r1*Math.sin(p2), z1), new THREE.Vector3(r1*Math.cos(p2), r1*Math.sin(p2), z2)], c3);
  } else if (pSingle) { 
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z1), new THREE.Vector3(r2*Math.cos(p1), r2*Math.sin(p1), z1)], c1);
    drawLineCurve([new THREE.Vector3(r2*Math.cos(p1), r2*Math.sin(p1), z1), new THREE.Vector3(r2*Math.cos(p1), r2*Math.sin(p1), z2)], c3);
    drawLineCurve([new THREE.Vector3(r2*Math.cos(p1), r2*Math.sin(p1), z2), new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z2)], c1);
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z2), new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z1)], c3);
  } else if (zSingle) { 
    drawCylArc(r1, p1, p2, z1, c2); drawCylArc(r2, p1, p2, z1, c2);
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p1), r1*Math.sin(p1), z1), new THREE.Vector3(r2*Math.cos(p1), r2*Math.sin(p1), z1)], c1);
    drawLineCurve([new THREE.Vector3(r1*Math.cos(p2), r1*Math.sin(p2), z1), new THREE.Vector3(r2*Math.cos(p2), r2*Math.sin(p2), z1)], c1);
  }
  else { 
    drawCylArc(r1, p1, p2, z1, c2); drawCylArc(r1, p1, p2, z2, c2); drawCylArc(r2, p1, p2, z1, c2); drawCylArc(r2, p1, p2, z2, c2);
    const rads = [r1, r2], angs = [p1, p2], zs = [z1, z2];
    rads.forEach(r => { angs.forEach(a => drawLineCurve([new THREE.Vector3(r*Math.cos(a), r*Math.sin(a), z1), new THREE.Vector3(r*Math.cos(a), r*Math.sin(a), z2)], c3)) });
    angs.forEach(a => { zs.forEach(z => drawLineCurve([new THREE.Vector3(r1*Math.cos(a), r1*Math.sin(a), z), new THREE.Vector3(r2*Math.cos(a), r2*Math.sin(a), z)], c1)) });
  }
}

function drawSphPhiArc(r, theta, pStart, pEnd, colorHex = 0xfacc15) {
  const pts = [];
  const segs = 32, sinT = Math.sin(theta), cosT = Math.cos(theta);
  for (let i = 0; i <= segs; i++) {
    const p = pStart + (i / segs) * (pEnd - pStart);
    pts.push(new THREE.Vector3(r * sinT * Math.cos(p), r * sinT * Math.sin(p), r * cosT));
  }
  drawLineCurve(pts, colorHex);
}

function drawSphThetaArc(r, phi, tStart, tEnd, colorHex = 0xfacc15) {
  const pts = [];
  const segs = 32, cosP = Math.cos(phi), sinP = Math.sin(phi);
  for (let i = 0; i <= segs; i++) {
    const t = tStart + (i / segs) * (tEnd - tStart);
    pts.push(new THREE.Vector3(r * Math.sin(t) * cosP, r * Math.sin(t) * sinP, r * Math.cos(t)));
  }
  drawLineCurve(pts, colorHex);
}

function drawSphRadialLine(r1, r2, theta, phi, colorHex = 0xfacc15) {
  const sinT = Math.sin(theta), cosT = Math.cos(theta), cosP = Math.cos(phi), sinP = Math.sin(phi);
  drawLineCurve([
    new THREE.Vector3(r1 * sinT * cosP, r1 * sinT * sinP, r1 * cosT),
    new THREE.Vector3(r2 * sinT * cosP, r2 * sinT * sinP, r2 * cosT)
  ], colorHex);
}

function buildSphericalIntersections(sys) {
  if (sys.filter(p => p.visible).length < 2) return;

  const degToRad = Math.PI / 180;
  const [r1, r2] = getInterval(sys[0], 0.1, 4);
  const [t1, t2] = getInterval(sys[1], 0.01, 179.9, degToRad);
  const [p1, p2] = getInterval(sys[2], 0, 360, degToRad);

  const c1 = sys[0].colorHex;
  const c2 = sys[1].colorHex;
  const c3 = sys[2].colorHex;

  const rSingle = (r1 === r2), tSingle = (t1 === t2), pSingle = (p1 === p2);

  if (rSingle && tSingle && pSingle) {
    drawPointMarker(new THREE.Vector3(r1*Math.sin(t1)*Math.cos(p1), r1*Math.sin(t1)*Math.sin(p1), r1*Math.cos(t1)), 0xfacc15);
  }
  else if (rSingle && tSingle) {
    drawSphPhiArc(r1, t1, p1, p2, c3);
  } else if (rSingle && pSingle) {
    drawSphThetaArc(r1, p1, t1, t2, c2);
  } else if (tSingle && pSingle) {
    drawSphRadialLine(r1, r2, t1, p1, c1);
  }
  else if (rSingle) { 
    drawSphPhiArc(r1, t1, p1, p2, c3); drawSphPhiArc(r1, t2, p1, p2, c3);
    drawSphThetaArc(r1, p1, t1, t2, c2); drawSphThetaArc(r1, p2, t1, t2, c2);
  } else if (tSingle) { 
    drawSphPhiArc(r1, t1, p1, p2, c3); drawSphPhiArc(r2, t1, p1, p2, c3);
    drawSphRadialLine(r1, r2, t1, p1, c1); drawSphRadialLine(r1, r2, t1, p2, c1);
  } else if (pSingle) { 
    drawSphThetaArc(r1, p1, t1, t2, c2); drawSphThetaArc(r2, p1, t1, t2, c2);
    drawSphRadialLine(r1, r2, t1, p1, c1); drawSphRadialLine(r1, r2, t2, p1, c1);
  }
  else { 
    drawSphPhiArc(r1, t1, p1, p2, c3); drawSphPhiArc(r1, t2, p1, p2, c3); drawSphPhiArc(r2, t1, p1, p2, c3); drawSphPhiArc(r2, t2, p1, p2, c3);
    drawSphThetaArc(r1, p1, t1, t2, c2); drawSphThetaArc(r1, p2, t1, t2, c2); drawSphThetaArc(r2, p1, t1, t2, c2); drawSphThetaArc(r2, p2, t1, t2, c2);
    drawSphRadialLine(r1, r2, t1, p1, c1); drawSphRadialLine(r1, r2, t1, p2, c1); drawSphRadialLine(r1, r2, t2, p1, c1); drawSphRadialLine(r1, r2, t2, p2, c1);
  }
}

/* ----- MATHEMATICAL HUD DISPLAY TELEMETRY ----- */
function updateHUDReadout() {
  const panel = document.getElementById('hud-readout-panel');
  let str = `<strong>System Mode: ${activeSystem.toUpperCase()}${eqnModeOn ? ' · EQN' : ''}</strong>`;

  if (!eqnModeOn) {
    if (activeSystem === 'cart') {
      const sys = config.cart;
      str += `<div>Pos: [X: ${sys[0].val.toFixed(1)}, Y: ${sys[1].val.toFixed(1)}, Z: ${sys[2].val.toFixed(1)}]</div>`;
    } else if (activeSystem === 'cyl') {
      const sys = config.cyl;
      str += `<div>Cyl: [ρ: ${sys[0].val.toFixed(1)}m, ϕ: ${sys[1].val}°, Z: ${sys[2].val.toFixed(1)}m]</div>`;
    } else if (activeSystem === 'sph') {
      const sys = config.sph;
      str += `<div>Sph: [r: ${sys[0].val.toFixed(1)}m, θ: ${sys[1].val}°, ϕ: ${sys[2].val}°]</div>`;
    }
  } else {
    const eConf = eqnState[activeSystem];
    const plotVars = getEffectivePlotAxes();
    const visibleEqs = eConf.equations.filter(eq => eq.visible && eq.expression.trim());
    str += `<div>Rendering ${visibleEqs.length} of ${eConf.equations.length} equation(s)</div>`;
    visibleEqs.forEach(eq => {
      str += `<div style="color:${eq.color}">${eq.expression}</div>`;
    });
    const rangeStrs = plotVars.map(v => {
      const rs = eConf.varRanges[v];
      const meta = metaFor(v);
      return rs ? `${meta.symbol}: [${formatVarVal(rs.min, meta)}, ${formatVarVal(rs.max, meta)}]` : '';
    }).filter(Boolean).join('&nbsp;&nbsp;');
    str += `<div style="color:var(--text-muted); font-size:11px;">${rangeStrs}</div>`;
  }
  panel.innerHTML = str;
}

/* =====================================================================
   LIVE AREA / VOLUME METRICS ENGINE
   Computes a closed-form measure (length / area / volume) for the current
   region, matching exactly what's rendered: same getInterval() bounds the
   fill/intersection engines use, so the number and the visual never
   disagree. Which formula applies depends on how many of the 3 axes are
   actually ranged (min != max) -- 0 (point), 1 (line), 2 (area), or 3
   (volume) -- and, per system, WHICH axes those are, since e.g. a
   cylindrical patch with rho+z ranged is flat while one with phi+z ranged
   is a curved wall with a different area element.
   ===================================================================== */
function fmtNum(n) {
  if (!isFinite(n)) return '—';
  const a = Math.abs(n);
  const digits = a >= 100 ? 1 : (a >= 1 ? 2 : 3);
  return n.toFixed(digits);
}

function computeMetrics() {
  const sys = config[activeSystem];
  const degToRad = Math.PI / 180;

  if (activeSystem === 'cart') {
    const [x1, x2] = getInterval(sys[0]);
    const [y1, y2] = getInterval(sys[1]);
    const [z1, z2] = getInterval(sys[2]);
    const dx = Math.abs(x2 - x1), dy = Math.abs(y2 - y1), dz = Math.abs(z2 - z1);
    const ranged = [dx > 1e-9, dy > 1e-9, dz > 1e-9];
    const n = ranged.filter(Boolean).length;

    if (n === 0) return { label: 'Point', value: null, unit: '', formula: '(x₀, y₀, z₀) -- no area/volume' };
    if (n === 1) {
      const L = dx || dy || dz;
      const axis = dx ? 'x' : (dy ? 'y' : 'z');
      return { label: 'Length', value: L, unit: 'm', formula: `L = |Δ${axis}|` };
    }
    if (n === 2) {
      const dims = [['x', dx], ['y', dy], ['z', dz]].filter(([, d]) => d > 1e-9);
      const A = dims[0][1] * dims[1][1];
      return { label: 'Area', value: A, unit: 'm²', formula: `A = Δ${dims[0][0]}·Δ${dims[1][0]}` };
    }
    const V = dx * dy * dz;
    return { label: 'Volume', value: V, unit: 'm³', formula: 'V = Δx·Δy·Δz' };
  }

  if (activeSystem === 'cyl') {
    let [r1, r2] = getInterval(sys[0], 0.1, 4);
    const [p1, p2] = getInterval(sys[1], 0, 360, degToRad);
    const [z1, z2] = getInterval(sys[2], -4, 4);
    let dr = Math.abs(r2 - r1);
    const dp = Math.abs(p2 - p1), dz = Math.abs(z2 - z1);
    let rangedR = dr > 1e-9;
    const rangedP = dp > 1e-9, rangedZ = dz > 1e-9;
    let n = [rangedR, rangedP, rangedZ].filter(Boolean).length;

    // Mirrors the same special case in buildCylindricalFillVolume: in Fill
    // Surface mode, a full/partial phi sweep with rho pinned const (and
    // positive) reads as a sector/disc filled in from rho=0, not a bare
    // arc -- so the readout should report that area, not an arc length.
    if (stateViewMode === 'fill' && n === 1 && rangedP && !rangedR && sys[0].mode === 'const' && r1 > 0.0001) {
      r1 = 0; dr = Math.abs(r2 - r1); rangedR = true; n = 2;
    }

    if (n === 0) return { label: 'Point', value: null, unit: '', formula: '(ρ₀, ϕ₀, z₀) -- no area/volume' };
    if (n === 1) {
      if (rangedR) return { label: 'Length', value: dr, unit: 'm', formula: 'L = Δρ' };
      if (rangedP) return { label: 'Length', value: ((r1 + r2) / 2) * dp, unit: 'm', formula: 'L = ρ·Δϕ  (arc)' };
      return { label: 'Length', value: dz, unit: 'm', formula: 'L = Δz' };
    }
    if (n === 2) {
      if (rangedR && rangedP) { // flat annular sector, z const
        const A = 0.5 * (r2 * r2 - r1 * r1) * dp;
        return { label: 'Area', value: A, unit: 'm²', formula: 'A = ½(ρ₂²-ρ₁²)·Δϕ  (sector)' };
      }
      if (rangedR && rangedZ) { // flat radial patch, phi const
        const A = dr * dz;
        return { label: 'Area', value: A, unit: 'm²', formula: 'A = Δρ·Δz  (flat patch)' };
      }
      // phi + z ranged, rho const -- curved cylindrical wall
      const A = ((r1 + r2) / 2) * dp * dz;
      return { label: 'Area', value: A, unit: 'm²', formula: 'A = ρ·Δϕ·Δz  (curved wall)' };
    }
    const V = 0.5 * (r2 * r2 - r1 * r1) * dp * dz;
    return { label: 'Volume', value: V, unit: 'm³', formula: 'V = ½(ρ₂²-ρ₁²)·Δϕ·Δz' };
  }

  if (activeSystem === 'sph') {
    let [r1, r2] = getInterval(sys[0], 0.1, 4);
    const [t1, t2] = getInterval(sys[1], 0.01, 179.9, degToRad);
    const [p1, p2] = getInterval(sys[2], 0, 360, degToRad);
    let dr = Math.abs(r2 - r1);
    const dt = Math.abs(t2 - t1), dp = Math.abs(p2 - p1);
    const tMid = (t1 + t2) / 2;
    let rangedR = dr > 1e-9;
    const rangedT = dt > 1e-9, rangedP = dp > 1e-9;
    let n = [rangedR, rangedT, rangedP].filter(Boolean).length;

    // Mirrors the same special case in buildSphericalFillVolume: in Fill
    // Surface mode, a single ranged angle (theta or phi) with r pinned
    // const (and positive) reads as a sector/disc filled in from r=0, not
    // a bare arc -- so the readout should report that area.
    if (stateViewMode === 'fill' && n === 1 && (rangedT || rangedP) && !rangedR && sys[0].mode === 'const' && r1 > 0.0001) {
      r1 = 0; dr = Math.abs(r2 - r1); rangedR = true; n = 2;
    }
    const rMid = (r1 + r2) / 2;

    if (n === 0) return { label: 'Point', value: null, unit: '', formula: '(r₀, θ₀, ϕ₀) -- no area/volume' };
    if (n === 1) {
      if (rangedR) return { label: 'Length', value: dr, unit: 'm', formula: 'L = Δr' };
      if (rangedT) return { label: 'Length', value: rMid * dt, unit: 'm', formula: 'L = r·Δθ  (arc)' };
      return { label: 'Length', value: rMid * Math.sin(tMid) * dp, unit: 'm', formula: 'L = r·sinθ·Δϕ  (arc)' };
    }
    if (n === 2) {
      if (rangedR && rangedT) { // flat half-plane sector, phi const
        const A = 0.5 * (r2 * r2 - r1 * r1) * dt;
        return { label: 'Area', value: A, unit: 'm²', formula: 'A = ½(r₂²-r₁²)·Δθ  (sector)' };
      }
      if (rangedR && rangedP) { // conical patch, theta const
        const A = 0.5 * Math.sin(tMid) * (r2 * r2 - r1 * r1) * dp;
        return { label: 'Area', value: A, unit: 'm²', formula: 'A = ½sinθ(r₂²-r₁²)·Δϕ  (cone)' };
      }
      // theta + phi ranged, r const -- curved spherical cap patch
      const A = rMid * rMid * (Math.cos(t1) - Math.cos(t2)) * dp;
      return { label: 'Area', value: A, unit: 'm²', formula: 'A = r²(cosθ₁-cosθ₂)·Δϕ  (cap)' };
    }
    const V = ((r2 ** 3 - r1 ** 3) / 3) * (Math.cos(t1) - Math.cos(t2)) * dp;
    return { label: 'Volume', value: V, unit: 'm³', formula: 'V = (r₂³-r₁³)/3·(cosθ₁-cosθ₂)·Δϕ' };
  }
}

function updateMetricsReadout() {
  const labelEl = document.getElementById('metrics-label');
  const valueEl = document.getElementById('metrics-value');
  const formulaEl = document.getElementById('metrics-formula');
  if (!labelEl) return;

  if (eqnModeOn) {
    labelEl.innerText = 'Measure';
    valueEl.innerText = 'N/A';
    formulaEl.innerText = 'No closed form for a custom equation surface';
    return;
  }

  const m = computeMetrics();
  labelEl.innerText = m.label;
  valueEl.innerText = (m.value === null) ? '—' : `${fmtNum(m.value)} ${m.unit}`;
  formulaEl.innerText = m.formula;
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

init();
</script>
